<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Zinnensimulator" />
  <meta name="theme-color" content="#FF385C" />
  <meta name="description" content="NT2 A2 Inburgeringsexamen - 492 zinnen trainer" />
  <title>Zinnensimulator</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { height: 100%; }
    body { background: #F7F7F7; -webkit-tap-highlight-color: transparent; user-select: none; }
    #loading { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #F7F7F7; gap: 20px; font-family: -apple-system, sans-serif; }
    .spinner { width: 44px; height: 44px; border: 3px solid #DDDDDD; border-top-color: #FF385C; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 15px; color: #717171; font-weight: 600; }
    #loading small { font-size: 12px; color: #AAAAAA; text-align: center; max-width: 240px; line-height: 1.5; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>Zinnensimulator NT2</p>
    <small>A carregar... Na primeira vez pode demorar uns segundos.</small>
  </div>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" src="app.jsx"></script>
  <script>
    const observer = new MutationObserver(() => {
      if (document.getElementById('root').children.length > 0) {
        document.getElementById('loading').style.display = 'none';
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById('root'), { childList: true });
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
